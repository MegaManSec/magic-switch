name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  version:
    runs-on: ubuntu-latest
    # semantic-release --dry-run still calls `git push --dry-run` to validate
    # push credentials, which GitHub's git server rejects with 403 unless the
    # minted token has write scope. No actual push happens (--dry-run is honored).
    permissions:
      contents: write

    outputs:
      new-release-version: ${{ steps.determine_version.outputs.new-release-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # semantic-release needs full history to determine the next version.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          # The pnpm tooling lives under .github/release/, not the repo root,
          # so the action must read its pinned `packageManager` version from
          # there. Without this it scans the (nonexistent) root package.json
          # and fails with "No pnpm version is specified".
          package_json_file: .github/release/package.json

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          cache-dependency-path: .github/release/pnpm-lock.yaml

      - name: Install release tooling
        # Reproducible, integrity-checked install from the committed lockfile
        # (pins the full semantic-release dependency tree, not just the majors).
        working-directory: .github/release
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: determine_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT="$(./.github/release/node_modules/.bin/semantic-release --dry-run --no-ci)"
          # Extract just the version triple to avoid picking up trailing
          # punctuation if the log format ever changes slightly.
          NEW_RELEASE_VERSION=$(echo "$OUTPUT" \
            | grep -oE 'next release version is [0-9]+\.[0-9]+\.[0-9]+' \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
            || true)
          if [ -n "$NEW_RELEASE_VERSION" ]; then
            echo "Will release v$NEW_RELEASE_VERSION"
            echo "new-release-version=$NEW_RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "No releasable commits since the last tag; skipping build & release."
          fi

  build:
    needs: version
    # Gate build on a real release version. The previous code defaulted an
    # empty extraction to "0.0.0", which then built and tagged a v0.0.0
    # release, overwriting tag history.
    if: needs.version.outputs.new-release-version != ''
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write # OIDC token for Sigstore signing
      attestations: write # publish SLSA build provenance
    outputs:
      zip-path: ${{ steps.create_zip.outputs.zip-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Update version
        run: |
          echo "The version is ${{ needs.version.outputs.new-release-version }}"
          PROJECT_FILE="Magic Switch.xcodeproj/project.pbxproj"
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = ${{ needs.version.outputs.new-release-version }};/g" "$PROJECT_FILE"
          echo "Updated Marketing version to ${{ needs.version.outputs.new-release-version }}"
          agvtool next-version -all

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "26.5"

      - name: Build
        run: |
          xcodebuild clean archive \
            -project "Magic Switch.xcodeproj" \
            -scheme "Magic Switch" \
            -configuration Release \
            -archivePath "Magic Switch.xcarchive"

      - name: Create ZIP
        id: create_zip
        run: |
          cd "Magic Switch.xcarchive/Products/Applications"
          ditto -c -k --sequesterRsrc --keepParent "Magic Switch.app" "../../../Magic Switch.app.zip"
          echo "zip-path=$(realpath "../../../Magic Switch.app.zip")" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "Magic Switch.app.zip"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp "Magic Switch.app.zip" artifacts/app.zip
          cp "Magic Switch.xcodeproj/project.pbxproj" artifacts/project.pbxproj

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-artifacts
          path: artifacts/

  release:
    needs:
      - version
      - build
    if: needs.version.outputs.new-release-version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download Build Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts
          path: artifacts/

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          # The pnpm tooling lives under .github/release/, not the repo root,
          # so the action must read its pinned `packageManager` version from
          # there. Without this it scans the (nonexistent) root package.json
          # and fails with "No pnpm version is specified".
          package_json_file: .github/release/package.json

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          cache-dependency-path: .github/release/pnpm-lock.yaml

      - name: Install release tooling
        # Reproducible, integrity-checked install from the committed lockfile
        # (pins the full semantic-release dependency tree, not just the majors).
        working-directory: .github/release
        run: pnpm install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/release/node_modules/.bin/semantic-release
